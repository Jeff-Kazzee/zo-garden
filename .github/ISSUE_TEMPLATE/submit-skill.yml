name: Submit a Skill (proposal)
description: Propose a new Skill before building it. Optional — you can also just open a PR.
title: "[skill] "
labels: ["submission", "skill"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to float a Skill idea before you build it. If you've already built it, just open a PR.
  - type: input
    id: slug
    attributes:
      label: Proposed slug
      description: Lowercase, hyphenated. Example, `cancel-subscriptions`.
      placeholder: my-skill-slug
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: When should an agent use this Skill? Be specific. Read `CONTRIBUTING.md` for examples.
      placeholder: |
        Parse bank transaction CSVs from Apple Card, Chase, or Mint. Use when the user wants to find recurring charges or audit subscriptions.
    validations:
      required: true
  - type: textarea
    id: prior-art
    attributes:
      label: Prior art / existing Skills
      description: Have you checked `zocomputer/skills` and `zo-garden`? Why isn't an existing one enough?
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission
      options:
        - label: I read `CONTRIBUTING.md`
          required: true
        - label: I'm willing to MIT-license this work
          required: true
