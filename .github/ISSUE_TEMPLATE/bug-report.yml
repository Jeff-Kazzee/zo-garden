name: Bug in a Skill / Persona / Prompt
description: Something in the registry is broken or wrong.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: item
    attributes:
      label: What's broken?
      placeholder: skills/cancel-subscriptions
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How do you reproduce it?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true
