name: Broken or stale link
description: A link in INDEX.md is broken, rotted, or no longer reflects the quality bar.
title: "[broken] "
labels: ["bug"]
body:
  - type: input
    id: entry
    attributes:
      label: Which entry?
      description: Name and section from `INDEX.md`.
      placeholder: e.g., "just-fucking-cancel" under Tools & utilities
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL that's broken
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: What's wrong?
      options:
        - Link is 404 / dead
        - Domain parked or for sale
        - Content removed or paywalled
        - Description is misleading or stale
        - No longer reflects the quality bar
        - Other
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: Details
      description: Anything the maintainer needs to verify and prune (or fix) the entry.
    validations:
      required: true
